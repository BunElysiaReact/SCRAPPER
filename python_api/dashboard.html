<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>◈ SCRAPY — Dashboard</title>
<script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body, #root { height: 100%; width: 100%; }
  body { background: #07070c; color: #d0d0e8; overflow: hidden; }
  #scrapy-loader {
    position: fixed; inset: 0; background: #07070c;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 20px; z-index: 9999;
    font-family: 'JetBrains Mono', monospace;
    transition: opacity .3s;
  }
  #scrapy-loader.done { opacity: 0; pointer-events: none; }
  .loader-logo { font-size: 22px; color: #00ff88; letter-spacing: 6px; font-weight: 700; }
  .loader-bar { width: 200px; height: 2px; background: #1c1c2e; border-radius: 2px; overflow: hidden; }
  .loader-bar-fill { height: 100%; background: #00ff88; animation: load-progress 1.2s ease-in-out forwards; }
  .loader-sub { font-size: 10px; color: #505070; letter-spacing: 2px; }
  @keyframes load-progress { 0% { width:0% } 60% { width:70% } 100% { width:100% } }
  @keyframes blink { 0%,100% { opacity:1 } 50% { opacity:.3 } }
  .loader-dot { display:inline-block; animation:blink 1.4s infinite; }
  .loader-dot:nth-child(2) { animation-delay:.2s; }
  .loader-dot:nth-child(3) { animation-delay:.4s; }
</style>
</head>
<body>

<div id="scrapy-loader">
  <div class="loader-logo">◈ SCRAPY</div>
  <div class="loader-bar"><div class="loader-bar-fill"></div></div>
  <div class="loader-sub">initializing<span class="loader-dot">.</span><span class="loader-dot">.</span><span class="loader-dot">.</span></div>
</div>

<div id="root"></div>

<script type="text/babel" data-presets="react" id="scrapy-app">
const { useState, useEffect, useRef, useCallback } = React;

const API = "http://localhost:8080";
const apiFetch = async (path, opts) => {
  try {
    const r = await fetch(API + path, opts);
    if (r.headers.get("content-type")?.includes("json")) return r.json();
    return {};
  } catch { return {}; }
};
const dqs = (d) => d ? `?domain=${encodeURIComponent(d)}` : "";

const T = {
  bg:"#07070c",bgCard:"#0c0c14",bgHover:"#111120",
  border:"#1c1c2e",border2:"#252538",
  green:"#00ff88",cyan:"#00e5ff",yellow:"#ffe066",
  orange:"#ff9500",red:"#ff4560",purple:"#b388ff",
  pink:"#ff6090",
  text:"#d0d0e8",textDim:"#606080",textMid:"#9090b0",
  font:"'JetBrains Mono','Fira Code','Cascadia Code',monospace",
};

const GLOBAL_CSS = `
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600;700&display=swap');
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  body{font-family:${T.font};background:${T.bg};color:${T.text};height:100vh;overflow:hidden}
  ::-webkit-scrollbar{width:3px;height:3px}
  ::-webkit-scrollbar-track{background:transparent}
  ::-webkit-scrollbar-thumb{background:${T.border2};border-radius:2px}
  *{scrollbar-width:thin;scrollbar-color:${T.border2} transparent}
  @keyframes pulse-dot{0%,100%{opacity:1}50%{opacity:.3}}
  @keyframes fade-in{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}
  @keyframes slide-in{from{opacity:0;transform:translateX(-6px)}to{opacity:1;transform:translateX(0)}}
  @keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
  @keyframes ws-flash{0%{background:rgba(0,255,136,.18)}100%{background:transparent}}
  @keyframes number-pop{0%{transform:scale(1)}50%{transform:scale(1.4);color:#ffe066}100%{transform:scale(1)}}
  .fade-in{animation:fade-in .2s ease}
  .slide-in{animation:slide-in .15s ease}
  .spin{animation:spin 1s linear infinite;display:inline-block}
  .ws-flash{animation:ws-flash .6s ease}
`;
if (!document.getElementById("scrapy-styles")) {
  const s = document.createElement("style");
  s.id = "scrapy-styles"; s.textContent = GLOBAL_CSS;
  document.head.appendChild(s);
}

const esc = (s) => String(s??"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
const fmtTime = (ts) => new Date(ts||Date.now()).toLocaleTimeString([],{hour:"2-digit",minute:"2-digit",second:"2-digit"});
const fmtDuration = (ms) => {
  if (!ms) return "—";
  if (ms < 1000) return ms + "ms";
  if (ms < 60000) return (ms/1000).toFixed(1) + "s";
  return Math.floor(ms/60000) + "m " + Math.floor((ms%60000)/1000) + "s";
};

const TYPE_META = {
  request:{icon:"→",label:"REQ",color:T.green},
  response:{icon:"←",label:"RES",color:"#29d4f5"},
  response_body:{icon:"⬡",label:"BODY",color:"#448aff"},
  auth_cookie:{icon:"⚿",label:"AUTH",color:T.yellow},
  cookies:{icon:"◈",label:"COOKIE",color:T.orange},
  cookies_changed:{icon:"◌",label:"COOKIE△",color:"#333355"},
  websocket:{icon:"⟳",label:"WS",color:T.purple},
  websocket_opened:{icon:"⊕",label:"WS↑",color:T.green},
  websocket_closed:{icon:"⊗",label:"WS↓",color:T.red},
  websocket_handshake:{icon:"🤝",label:"WS~",color:T.cyan},
  websocket_error:{icon:"💥",label:"WS!",color:T.red},
  dommap:{icon:"⊞",label:"DOM",color:T.cyan},
  debugger_status:{icon:"◉",label:"DBG",color:"#9c60ff"},
  html:{icon:"⌨",label:"HTML",color:T.green},
  screenshot:{icon:"⬜",label:"SHOT",color:T.pink},
  storage:{icon:"⊟",label:"STORE",color:T.orange},
};
const getMeta = (t) => TYPE_META[t]||{icon:"·",label:(t||"?").slice(0,6).toUpperCase(),color:T.textDim};
const METHOD_COLOR = {GET:T.green,POST:T.orange,PUT:"#448aff",DELETE:T.red,PATCH:T.purple,HEAD:T.textDim};
const FLAG_COLORS = {
  BEARER_TOKEN:T.yellow,API:"#448aff",AUTH_FLOW:T.red,CF_CLEARANCE:T.orange,
  POST_DATA:T.purple,CLOUDFLARE:T.orange,WEBSOCKET:T.cyan,BASIC_AUTH:T.yellow,
  CRASH_POINT:T.red,MULTIPLIER:T.yellow,GAME_STATE:"#29d4f5",ROUND_ID:T.cyan,
  HASH:"#9c60ff",CASHOUT:T.orange,BALANCE:T.green,BET:T.pink,
  PLAYER_DATA:T.textMid,RESULT:T.red,PAYOUT:T.green,
  HEARTBEAT:T.border2,HAS_NUMBERS:T.yellow,BINARY_JSON:"#448aff",
  BINARY:T.textDim,MSGPACK:"#ff9500",PROTOBUF_OR_CUSTOM:T.textDim,
};

// ── LLM formatter ─────────────────────────────────────────────────────────────
const KEEP_HEADERS = new Set(['authorization','x-auth-token','content-type','accept','origin',
  'referer','x-csrf-token','cookie','set-cookie','cf-ray','user-agent']);
function filterHeaders(headers) {
  if (!headers) return {};
  const out = {};
  for (const [k, v] of Object.entries(headers)) {
    if (KEEP_HEADERS.has(k.toLowerCase())) {
      out[k] = String(v).length > 200 ? String(v).slice(0,200)+"…" : v;
    }
  }
  return out;
}
function cleanBody(body, maxLen=2000) {
  if (!body) return null;
  const s = typeof body==="string" ? body : JSON.stringify(body);
  if (s.length>200 && /^[A-Za-z0-9+/=\r\n]+$/.test(s.replace(/\s/g,"")))
    return `[base64 encoded, ${s.length} chars — omitted]`;
  try {
    const p = JSON.parse(s);
    const pp = JSON.stringify(p,null,2);
    return pp.length>maxLen ? pp.slice(0,maxLen)+"\n…[truncated]" : pp;
  } catch {
    return s.length>maxLen ? s.slice(0,maxLen)+"\n…[truncated]" : s;
  }
}
function formatRequestForLLM(req) {
  const lines=[];
  lines.push(`### ${req.method||req.reqMethod||"GET"} ${req.url||""}${req.status?` → ${req.status}`:""}`);
  const rh=filterHeaders(req.headers||req.reqHeaders);
  if(Object.keys(rh).length){lines.push("REQUEST HEADERS:");for(const[k,v] of Object.entries(rh))lines.push(`  ${k}: ${v}`);}
  const pd=cleanBody(req.postData||req.reqPostData,1500);
  if(pd){lines.push("REQUEST BODY:");lines.push(pd);}
  const b=cleanBody(req.body,2000);
  if(b){lines.push("RESPONSE BODY:");lines.push(b);}
  return lines.join("\n");
}
function formatSiteForLLM(items,domain) {
  const sections=[`# Site: ${domain}`,`# Captured: ${items.length} requests`,"---"];
  const seen=new Set();
  const deduped=items.filter(r=>{const k=`${r.method||r.reqMethod}::${r.url}`;if(seen.has(k))return false;seen.add(k);return true;});
  const sorted=[...deduped].sort((a,b)=>(b.flags||[]).length-(a.flags||[]).length);
  for(const req of sorted){sections.push(formatRequestForLLM(req));sections.push("---");}
  return sections.join("\n");
}

function useCopyBtn(textFn) {
  const [state,setState]=useState("idle");
  const go=async()=>{
    setState("copying");
    try{const text=await textFn();await navigator.clipboard.writeText(text);setState("done");setTimeout(()=>setState("idle"),1800);}
    catch{setState("err");setTimeout(()=>setState("idle"),2000);}
  };
  const label=state==="copying"?"…":state==="done"?"✓ Copied!":state==="err"?"✕ Failed":"📋 Copy for LLM";
  const color=state==="done"?T.green:state==="err"?T.red:T.cyan;
  return{go,label,color,busy:state==="copying"};
}

// ── Base components ───────────────────────────────────────────────────────────
const Label=({text,color=T.textDim})=>(
  <span style={{fontSize:9,padding:"2px 5px",borderRadius:2,letterSpacing:.5,border:`1px solid ${color}33`,color,background:color+"0f",fontFamily:T.font,whiteSpace:"nowrap",fontWeight:500}}>{text}</span>
);
const SectionHead=({children,action})=>(
  <div style={{fontSize:9,color:T.textDim,textTransform:"uppercase",letterSpacing:2,padding:"14px 0 6px",borderBottom:`1px solid ${T.border}`,marginBottom:8,display:"flex",alignItems:"center",justifyContent:"space-between"}}>
    <span>{children}</span>{action}
  </div>
);
const Btn=({children,onClick,variant="green",small,disabled,style:sx})=>{
  const pal={green:[T.green,T.green+"18"],red:[T.red,T.red+"18"],yellow:[T.yellow,T.yellow+"18"],ghost:[T.textDim,T.border],cyan:[T.cyan,T.cyan+"18"],orange:[T.orange,T.orange+"18"],purple:[T.purple,T.purple+"18"]};
  const[c,bg]=pal[variant]||pal.green;
  const[hov,setHov]=useState(false);
  return <button onClick={onClick} disabled={disabled} onMouseEnter={()=>setHov(true)} onMouseLeave={()=>setHov(false)}
    style={{background:hov?c:bg,border:`1px solid ${c}${hov?"ff":"66"}`,color:hov?T.bg:c,padding:small?"2px 8px":"4px 12px",cursor:disabled?"not-allowed":"pointer",fontFamily:T.font,fontSize:small?9:11,borderRadius:3,transition:"all .1s",opacity:disabled?.4:1,...sx}}>{children}</button>;
};
const Input=({value,onChange,placeholder,onKeyDown,style:sx})=>(
  <input value={value} onChange={onChange} placeholder={placeholder} onKeyDown={onKeyDown}
    style={{background:T.bgCard,border:`1px solid ${T.border2}`,color:T.text,padding:"5px 10px",fontFamily:T.font,fontSize:11,borderRadius:3,outline:"none",...sx}}
    onFocus={e=>e.target.style.borderColor=T.green+"88"} onBlur={e=>e.target.style.borderColor=T.border2}/>
);
const Toolbar=({children})=>(
  <div style={{padding:"8px 12px",background:T.bgCard,borderBottom:`1px solid ${T.border}`,display:"flex",gap:8,alignItems:"center",flexShrink:0,flexWrap:"wrap"}}>{children}</div>
);
const TypeBadge=({type,small})=>{
  const{icon,label,color}=getMeta(type);
  return <span style={{display:"inline-flex",alignItems:"center",gap:3,fontSize:small?8:9,padding:small?"1px 4px":"2px 6px",borderRadius:2,whiteSpace:"nowrap",fontWeight:500,border:`1px solid ${color}33`,color,background:color+"0f",minWidth:small?40:56,justifyContent:"center"}}><span>{icon}</span><span style={{letterSpacing:.5}}>{label}</span></span>;
};
const MethodBadge=({method})=>{
  const c=METHOD_COLOR[method]||T.textDim;
  return <span style={{fontSize:9,padding:"2px 5px",borderRadius:2,fontWeight:600,color:c,border:`1px solid ${c}33`,background:c+"0f",minWidth:34,textAlign:"center"}}>{method}</span>;
};
const Empty=({icon="◌",message})=>(
  <div style={{display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",height:"100%",gap:10,opacity:.3}}>
    <div style={{fontSize:32,color:T.textDim}}>{icon}</div>
    <div style={{fontSize:11,color:T.textDim,textAlign:"center",lineHeight:1.7}}>{message}</div>
  </div>
);
const CodeBlock=({data,maxHeight=220})=>{
  const[col,setCol]=useState(false);
  const content=typeof data==="string"?data:JSON.stringify(data,null,2);
  return(
    <div style={{position:"relative"}}>
      <div onClick={()=>setCol(c=>!c)} style={{position:"absolute",top:5,right:7,zIndex:1,fontSize:8,color:T.textDim,cursor:"pointer",background:T.bg,padding:"1px 5px",borderRadius:2}}>{col?"▼ expand":"▲ collapse"}</div>
      {!col&&<pre style={{background:T.bg,padding:"8px 10px",borderRadius:3,fontSize:10,overflowX:"auto",whiteSpace:"pre-wrap",wordBreak:"break-all",maxHeight,overflowY:"auto",color:T.textMid,lineHeight:1.6,border:`1px solid ${T.border}`}}>{content}</pre>}
    </div>
  );
};
const ReqCard=({req,defaultOpen})=>{
  const[open,setOpen]=useState(defaultOpen||false);
  const m=req.method||req.reqMethod||"GET";
  const copy=useCopyBtn(()=>formatRequestForLLM(req));
  return(
    <div className="fade-in" style={{border:`1px solid ${T.border}`,borderRadius:4,marginBottom:4,overflow:"hidden",background:T.bgCard}}>
      <div onClick={()=>setOpen(o=>!o)} style={{padding:"6px 10px",display:"flex",alignItems:"center",gap:6,cursor:"pointer",background:open?T.bgHover:"transparent",transition:"background .1s"}}
        onMouseEnter={e=>e.currentTarget.style.background=T.bgHover} onMouseLeave={e=>e.currentTarget.style.background=open?T.bgHover:"transparent"}>
        <span style={{color:T.textDim,fontSize:9,width:8}}>{open?"▼":"▶"}</span>
        <MethodBadge method={m}/>
        <span style={{fontSize:10,flex:1,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",color:T.text}}>{req.url}</span>
        <div style={{display:"flex",gap:3}}>{(req.flags||[]).slice(0,4).map(f=><Label key={f} text={f} color={FLAG_COLORS[f]||T.textDim}/>)}</div>
        {req.status&&<span style={{fontSize:9,color:req.status>=400?T.red:T.green,fontWeight:600,minWidth:26}}>{req.status}</span>}
        <span onClick={e=>{e.stopPropagation();copy.go();}}
          style={{fontSize:8,padding:"2px 7px",borderRadius:2,border:`1px solid ${copy.color}44`,color:copy.color,background:copy.color+"0d",cursor:"pointer",whiteSpace:"nowrap",flexShrink:0}}>
          {copy.label}
        </span>
      </div>
      {open&&<div style={{padding:"8px 10px",borderTop:`1px solid ${T.border}`}}>
        {(req.headers||req.reqHeaders)&&<><div style={{fontSize:9,color:T.textDim,marginBottom:4}}>HEADERS</div><CodeBlock data={req.headers||req.reqHeaders} maxHeight={140}/></>}
        {(req.postData||req.reqPostData)&&<><div style={{fontSize:9,color:T.orange,margin:"8px 0 4px"}}>POST DATA</div><CodeBlock data={req.postData||req.reqPostData} maxHeight={120}/></>}
        {req.body&&<><div style={{fontSize:9,color:T.cyan,margin:"8px 0 4px"}}>BODY</div><CodeBlock data={req.body} maxHeight={240}/></>}
      </div>}
    </div>
  );
};

const TokenCard=({token,domain})=>{
  const[copied,setCopied]=useState(false);
  return(
    <div className="fade-in" style={{background:T.bgCard,border:`1px solid ${T.yellow}22`,borderRadius:4,padding:"9px 12px",marginBottom:6}}>
      <div style={{fontSize:9,color:T.textDim,marginBottom:5,display:"flex",gap:10}}>
        {domain&&<span style={{color:T.green}}>{domain}</span>}
        <span style={{overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{(token.url||"").slice(0,80)}</span>
      </div>
      <div onClick={()=>{navigator.clipboard.writeText("Bearer "+token.token).catch(()=>{});setCopied(true);setTimeout(()=>setCopied(false),1400);}}
        style={{fontSize:10,color:T.yellow,wordBreak:"break-all",background:T.bg,padding:"6px 10px",borderRadius:3,cursor:"pointer",border:`1px solid ${T.yellow}22`,position:"relative"}}>
        Bearer {token.token}
        <span style={{position:"absolute",right:7,top:"50%",transform:"translateY(-50%)",fontSize:8,color:copied?T.green:T.textDim}}>{copied?"✓ copied":"click to copy"}</span>
      </div>
    </div>
  );
};
const CookieCard=({cookie,domain})=>{
  const c=cookie.cookie||cookie;
  const[copied,setCopied]=useState(false);
  return(
    <div className="fade-in" style={{background:T.bgCard,border:`1px solid ${T.orange}22`,borderRadius:4,padding:"8px 12px",marginBottom:5}}>
      <div style={{display:"flex",gap:7,alignItems:"center",marginBottom:4}}>
        {domain&&<span style={{fontSize:9,color:T.green}}>{domain}</span>}
        <span style={{fontSize:11,color:T.yellow,fontWeight:500}}>{c.name}</span>
        {c.httpOnly&&<Label text="httpOnly" color={T.orange}/>}
        {c.secure&&<Label text="secure" color="#29b6f6"/>}
      </div>
      <div onClick={()=>{navigator.clipboard.writeText(c.value||"").catch(()=>{});setCopied(true);setTimeout(()=>setCopied(false),1400);}}
        style={{fontSize:10,color:copied?T.green:T.textMid,wordBreak:"break-all",cursor:"pointer"}}>
        {(c.value||"").slice(0,300)}
      </div>
    </div>
  );
};

// ══════════════════════════════════════════════════════════════════════════════
// ── WEBSOCKET TAB ─────────────────────────────────────────────────────────────
// ══════════════════════════════════════════════════════════════════════════════

const WS_FLAG_PRIORITY = ['CRASH_POINT','RESULT','MULTIPLIER','GAME_STATE','PAYOUT',
  'CASHOUT','ROUND_ID','HASH','BET','BALANCE','PLAYER_DATA','HAS_NUMBERS','BINARY_JSON'];
const WS_NOISE = ['HEARTBEAT'];

function wsPayloadPreview(frame) {
  if (frame.parsed) {
    try { return JSON.stringify(frame.parsed).slice(0,120); }
    catch {}
  }
  return (frame.payload||"").slice(0,120);
}

function isInterestingFrame(frame) {
  const flags = frame.flags || [];
  return flags.some(f => WS_FLAG_PRIORITY.includes(f)) || (flags.length > 0 && !flags.every(f => WS_NOISE.includes(f)));
}

// Stat card for the top row
const WSStat=({label,value,color,sub})=>(
  <div style={{background:T.bgCard,border:`1px solid ${color}22`,borderRadius:4,padding:"10px 14px",flex:1,minWidth:80}}>
    <div style={{fontSize:8,color:T.textDim,textTransform:"uppercase",letterSpacing:1.5,marginBottom:6}}>{label}</div>
    <div style={{fontSize:22,color,fontWeight:700,fontVariantNumeric:"tabular-nums",lineHeight:1}}>{value}</div>
    {sub&&<div style={{fontSize:9,color:T.textDim,marginTop:4}}>{sub}</div>}
  </div>
);

// Single WS frame row
const WSFrameRow=({frame,onClick,selected})=>{
  const flags      = frame.flags||[];
  const isHB       = flags.includes("HEARTBEAT");
  const direction  = frame.direction==="recv"?"←":"→";
  const dirColor   = frame.direction==="recv"?T.cyan:T.orange;
  const preview    = wsPayloadPreview(frame);
  const topFlag    = WS_FLAG_PRIORITY.find(f=>flags.includes(f));
  const isBinary   = flags.includes("BINARY");

  const extracted  = frame.extracted||{};
  const hasNumbers = Object.keys(extracted).length>0;

  return (
    <div onClick={()=>onClick(frame)} className={selected?"":""}
      style={{
        padding:"5px 10px",
        borderBottom:`1px solid ${T.bg}`,
        cursor:"pointer",
        background:selected?T.purple+"12":isHB?T.bg+"44":"transparent",
        borderLeft:`2px solid ${selected?T.purple:topFlag?FLAG_COLORS[topFlag]||T.purple:"transparent"}`,
        opacity:isHB?.5:1,
        transition:"background .08s",
      }}
      onMouseEnter={e=>!selected&&(e.currentTarget.style.background=T.bgHover)}
      onMouseLeave={e=>!selected&&(e.currentTarget.style.background=isHB?T.bg+"44":"transparent")}
    >
      <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:hasNumbers?4:0}}>
        {/* Direction arrow */}
        <span style={{fontSize:11,color:dirColor,fontWeight:700,minWidth:12,flexShrink:0}}>{direction}</span>

        {/* Opcode badge */}
        {frame.opcode===2&&<span style={{fontSize:7,padding:"1px 4px",borderRadius:2,background:T.textDim+"22",color:T.textDim,flexShrink:0}}>BIN</span>}

        {/* Top flag */}
        {topFlag&&<span style={{fontSize:8,padding:"1px 5px",borderRadius:2,border:`1px solid ${FLAG_COLORS[topFlag]||T.purple}55`,color:FLAG_COLORS[topFlag]||T.purple,background:(FLAG_COLORS[topFlag]||T.purple)+"0f",fontWeight:600,flexShrink:0}}>{topFlag}</span>}

        {/* Payload preview */}
        <span style={{fontSize:10,color:isBinary?T.textDim:T.textMid,flex:1,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",fontFamily:T.font}}>
          {preview||<span style={{color:T.border2}}>(empty)</span>}
        </span>

        {/* Time */}
        <span style={{fontSize:8,color:T.textDim,flexShrink:0}}>{fmtTime(frame.timestamp)}</span>
      </div>

      {/* Extracted numbers row */}
      {hasNumbers&&(
        <div style={{display:"flex",gap:8,paddingLeft:18,flexWrap:"wrap"}}>
          {Object.entries(extracted).map(([k,v])=>(
            <span key={k} style={{fontSize:9,color:T.yellow,fontWeight:600}}>
              <span style={{color:T.textDim,fontWeight:400}}>{k}: </span>{v}
            </span>
          ))}
        </div>
      )}
    </div>
  );
};

// Connection badge in the sidebar panel
const WSConnBadge=({conn,selected,onClick})=>{
  const isOpen   = conn.open;
  const statusColor = isOpen?T.green:T.textDim;
  const fc = conn.frameCount||{recv:0,sent:0};

  );

// ── Main WebSocket Tab ────────────────────────────────────────────────────────
const WSTab=({domain,liveEvents})=>{
  const [connections, setConnections] = useState([]);

  const [selConn,     setSelConn]     = useState(null);
  const [selFrame,    setSelFrame]    = useState(null);
  const [filterMode,  setFilterMode]  = useState("interesting"); // all | interesting | recv | sent
  const [search,      setSearch]      = useState("");
  const [autoScroll,  setAutoScroll]  = useState(true);
  const [loading,     setLoading]     = useState(false);
  const frameListRef  = useRef(null);
  const prevFrameLen  = useRef(0);

  const load = useCallback(async () => {
    setLoading(true);
    const [conns, frms, st] = await Promise.all([
      apiFetch("/ws/connections" + dqs(domain)),
      apiFetch("/ws/frames" + (domain ? `?domain=${encodeURIComponent(domain)}&limit=500&heartbeat=0` : "?limit=500&heartbeat=0")),
      apiFetch("/ws/stats"  + dqs(domain)),
    ]);
    setConnections(Array.isArray(conns)?conns:[]);
    setFrames(Array.isArray(frms)?frms:[]);
    setStats(st&&typeof st==="object"?st:null);
    setLoading(false);
  }, [domain]);

  useEffect(()=>{load();},[load]);

  // Poll for new frames every 1s when live
  useEffect(()=>{
    const t = setInterval(async()=>{
      const frms = await apiFetch("/ws/frames"+(domain?`?domain=${encodeURIComponent(domain)}&limit=500&heartbeat=0`:"?limit=500&heartbeat=0"));
      if(Array.isArray(frms)) setFrames(frms);
      const conns = await apiFetch("/ws/connections"+dqs(domain));
      if(Array.isArray(conns)) setConnections(conns);
    }, 1200);
    return ()=>clearInterval(t);
  },[domain]);

  // Auto-scroll to bottom when new frames arrive
  useEffect(()=>{
    if(autoScroll && frameListRef.current && frames.length !== prevFrameLen.current) {
      prevFrameLen.current = frames.length;
      frameListRef.current.scrollTop = frameListRef.current.scrollHeight;
    }
  },[frames,autoScroll]);

  // Filter frames by selected connection + mode + search
  const filteredFrames = frames.filter(f=>{
    if(selConn && f.requestId !== selConn.requestId) return false;
    if(filterMode==="interesting" && !isInterestingFrame(f)) return false;
    if(filterMode==="recv" && f.direction!=="recv") return false;
    if(filterMode==="sent" && f.direction!=="sent") return false;
    if(search) {
      const hay = (f.payload||"")+(JSON.stringify(f.parsed||""))+(f.flags||[]).join(" ");
      if(!hay.toLowerCase().includes(search.toLowerCase())) return false;
    }
    return true;
  });

  // Stats summary
  const openConns   = connections.filter(c=>c.open).length;
  const totalFrames = stats?.frames?.total || frames.length;
  const interestingCount = frames.filter(isInterestingFrame).length;
  const flagCounts  = stats?.flags||{};
  const topFlags    = Object.entries(flagCounts).sort((a,b)=>b[1]-a[1]).slice(0,8);
  const numericStats= stats?.extractedValues||{};

  // WS copy helper
  const wsCopy = useCopyBtn(()=>{
    const interesting = filteredFrames.filter(isInterestingFrame);
    if(!interesting.length) return "No interesting WS frames captured.";
    const lines=[`# WebSocket Capture — ${domain||"all"}`,`# ${interesting.length} interesting frames`,`# Generated: ${new Date().toISOString()}`,"---"];
    for(const f of interesting.slice(0,50)){
      lines.push(`## [${f.direction}] ${fmtTime(f.timestamp)} flags=[${(f.flags||[]).join(",")}]`);
      if(f.extracted&&Object.keys(f.extracted).length) {
        lines.push(`Extracted: ${JSON.stringify(f.extracted)}`);
      }
      const preview=f.parsed?JSON.stringify(f.parsed,null,2).slice(0,800):f.payload?.slice(0,800);
      if(preview) lines.push(preview);
      lines.push("---");
    }
    return lines.join("\n");

                    Copy Frame JSON
                  </button>
                </div>
              </div>
            )
          }
        </div>
      </div>
    </div>
  );
};

const getDomain=(url)=>{try{return new URL(url).hostname.replace(/^www\./,"");}catch{return "";}};
function detectBodyType(body,mime,base64){const m=(mime||"").toLowerCase();if(m.includes("svg")||(!base64&&typeof body==="string"&&body.trimStart().startsWith("<svg")))return"svg";if(m.includes("image/"))return"image";if(m.includes("html"))return"html";if(m.includes("json")||m.includes("javascript"))return"json";if(base64){try{const d=atob(body.replace(/\s/g,"").slice(0,64));if(d.startsWith("<svg"))return"svg";if(d.startsWith("{"))return"json";if(d.startsWith("<!"))return"html";}catch{}return"binary";}if(typeof body==="string"){const t=body.trimStart();if(t.startsWith("{")||t.startsWith("["))return"json";if(t.startsWith("<svg"))return"svg";if(t.startsWith("<!"))return"html";}return"text";}
function decodeBody(body,base64){if(!body)return"";if(!base64)return body;try{return atob(body.replace(/\s/g,""));}catch{return body;}}
function prettyBody(raw,type){if(type==="json"){try{return JSON.stringify(JSON.parse(raw),null,2);}catch{return raw;}}return raw;}
const TYPE_COLOR={json:"#448aff",svg:"#ff9500",html:"#00ff88",image:"#b388ff",text:"#9090b0",binary:"#606080"};

const BodiesTab=({domain})=>{
  const[items,setItems]=useState([]);const[sel,setSel]=useState(null);const[filter,setFilter]=useState("");const[typeFilter,setTypeFilter]=useState("all");const[loading,setLoading]=useState(false);const[viewMode,setViewMode]=useState("pretty");
  const load=useCallback(async()=>{setLoading(true);const raw=await apiFetch("/bodies"+(domain?`?domain=${encodeURIComponent(domain)}&limit=200`:"?limit=200"));const arr=Array.isArray(raw)?raw:Object.values(raw||{}).flat();setItems(arr.map(item=>({...item,_type:detectBodyType(item.body,item.mimeType,item.base64)})));setLoading(false);setSel(null);},[domain]);
  useEffect(()=>{load();},[load]);
  const TYPE_FILTERS=["all","json","html","svg","image","text","binary"];

const DomTab=({domain,onUseSelector})=>{
  const[data,setData]=useState(null);const[view,setView]=useState("tree");const[search,setSearch]=useState("");
  const load=useCallback(()=>{apiFetch("/dommaps"+dqs(domain)).then(raw=>{const maps=domain?(raw||[]):Object.values(raw||{}).flat();const latest=maps[maps.length-1];setData(latest?(latest.dommap||latest):null);});},[domain]);
  useEffect(()=>{load();},[load]);
  if(!data)return(<div style={{display:"flex",flexDirection:"column",height:"100%"}}><Toolbar><span style={{fontSize:10,color:T.textDim}}>DOM Map</span><Btn small variant="ghost" onClick={load}>↻</Btn></Toolbar><Empty icon="⊞" message={"No DOM map yet.\nTrack a tab."}/>   </div>);
  const q=search.toLowerCase();const filt=(items,keyFn)=>items.filter(i=>!q||keyFn(i).toLowerCase().includes(q));
  const tags=filt(data.tags||[],t=>t.tag);const classes=filt(data.classes||[],c=>c.name);const ids=filt(data.ids||[],id=>id);
  const Chip=({label,color})=>(<span onClick={()=>onUseSelector(label)} style={{display:"inline-block",fontSize:10,padding:"2px 6px",borderRadius:2,background:color+"11",color,border:`1px solid ${color}33`,margin:2,cursor:"pointer"}} onMouseEnter={e=>{e.currentTarget.style.background=color;e.currentTarget.style.color=T.bg;}} onMouseLeave={e=>{e.currentTarget.style.background=color+"11";e.currentTarget.style.color=color;}}>{label}</span>);
  const treeData=[{label:`Tags (${tags.length})`,color:T.textDim,children:tags.map(t=>({label:t.tag,count:t.count,color:T.cyan}))},{label:`Classes (${classes.length})`,color:T.textDim,children:classes.slice(0,200).map(c=>({label:"."+c.name,count:c.count,color:T.green}))},{label:`IDs (${ids.length})`,color:T.textDim,children:ids.map(id=>({label:"#"+id,color:T.yellow}))}];
  return(<div style={{display:"flex",flexDirection:"column",height:"100%"}}><Toolbar><Input value={search} onChange={e=>setSearch(e.target.value)} placeholder="Search…" style={{flex:1}}/>{["tree","flat"].map(v=>(<button key={v} onClick={()=>setView(v)} style={{background:view===v?T.green+"20":"transparent",border:`1px solid ${view===v?T.green+"66":T.border}`,color:view===v?T.green:T.textDim,padding:"3px 9px",cursor:"pointer",fontFamily:T.font,fontSize:9,borderRadius:3}}>{v}</button>))}<Btn small variant="ghost" onClick={load}>↻</Btn></Toolbar><div style={{padding:"5px 10px 4px",fontSize:9,color:T.textDim,borderBottom:`1px solid ${T.border}`,flexShrink:0}}>{data.url&&<span style={{color:T.textMid}}>{data.url.slice(0,80)}</span>}<span style={{marginLeft:8,color:T.green+"88"}}>click item → auto-scrape</span></div><div style={{flex:1,overflowY:"auto",padding:10}}>{view==="tree"?treeData.map((n,i)=><TreeNode key={i} {...n} depth={0} onLeafClick={onUseSelector}/>):(<><SectionHead>Tags</SectionHead><div style={{marginBottom:12}}>{tags.map(t=><Chip key={t.tag} label={t.tag} color={T.cyan}/>)}</div><SectionHead>Classes</SectionHead><div style={{marginBottom:12}}>{classes.slice(0,200).map(c=><Chip key={c.name} label={"."+c.name} color={T.green}/>)}</div><SectionHead>IDs</SectionHead><div>{ids.map(id=><Chip key={id} label={"#"+id} color={T.yellow}/>)}</div></>)}</div></div>);
};

const FindTab=({domain,selectorInit})=>{
  const[url,setUrl]=useState("");const[selector,setSelector]=useState(selectorInit||"");const[results,setResults]=useState(null);const[phase,setPhase]=useState("idle");const[statusMsg,setStatusMsg]=useState("");const pollRef=useRef(null);
  useEffect(()=>{if(selectorInit)setSelector(selectorInit);},[selectorInit]);
  useEffect(()=>()=>{if(pollRef.current)clearInterval(pollRef.current);},[]);
  const getDomainFromUrl=(u)=>{try{return new URL(u).hostname.replace(/^www\./,"");}catch{return "";}};
  const run=async()=>{if(!selector.trim()||!url.trim())return;if(pollRef.current)clearInterval(pollRef.current);setResults(null);setPhase("navigating");setStatusMsg("Opening tab…");const navResp=await apiFetch("/navigate",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({url})});if(navResp?.error){setPhase("error");setStatusMsg("Navigation failed: "+navResp.error);return;}const targetDomain=getDomainFromUrl(url);setPhase("waiting_dom");setStatusMsg(`Waiting for page render…`);let attempts=0;pollRef.current=setInterval(async()=>{attempts++;if(attempts>40){clearInterval(pollRef.current);setPhase("error");setStatusMsg("Timed out.");return;}const dommaps=await apiFetch("/dommaps?domain="+encodeURIComponent(targetDomain));const maps=Array.isArray(dommaps)?dommaps:Object.values(dommaps||{}).flat();if(!maps.length)return;clearInterval(pollRef.current);setPhase("extracting");setStatusMsg("Extracting…");let finalResult=await apiFetch("/scrape?url="+encodeURIComponent(url)+"&selector="+encodeURIComponent(selector)+"&limit=100");if((!finalResult?.matches?.length)&&!finalResult?.error){const findResult=await apiFetch("/find?selector="+encodeURIComponent(selector)+"&domain="+encodeURIComponent(targetDomain));if(findResult?.results?.length){const matches=findResult.results.flatMap(r=>r.matches||[]);finalResult={...findResult,url,selector,count:matches.length,matches};}}setResults(finalResult);setPhase("done");setStatusMsg("");},500);};
  const cancel=()=>{if(pollRef.current)clearInterval(pollRef.current);setPhase("idle");setStatusMsg("");setResults(null);};
  const isRunning=["navigating","waiting_dom","extracting"].includes(phase);
  const findCopy=useCopyBtn(()=>{if(!results?.matches)return"";const lines=[`# Find: ${selector}`,`# URL: ${url}`,"---"];(results.matches||[]).forEach((m,i)=>{lines.push(`## Match ${i+1}: <${m.tag}>`);if(m.text)lines.push(`Text: ${m.text.slice(0,300)}`);lines.push(`HTML: ${(m.html||"").slice(0,500)}`);lines.push("");});return lines.join("\n");});
  return(<div style={{display:"flex",flexDirection:"column",height:"100%"}}><Toolbar><Input value={url} onChange={e=>setUrl(e.target.value)} placeholder="https://…" onKeyDown={e=>e.key==="Enter"&&run()} style={{flex:2,minWidth:200}}/><Input value={selector} onChange={e=>setSelector(e.target.value)} placeholder="selector…" onKeyDown={e=>e.key==="Enter"&&run()} style={{flex:1,minWidth:140}}/>{!isRunning?<Btn onClick={run} disabled={!url.trim()||!selector.trim()}>⟶ Scrape</Btn>:<Btn onClick={cancel} variant="red">✕ Cancel</Btn>}</Toolbar><div style={{flex:1,overflowY:"auto",padding:12}}>{(isRunning||phase==="error"||phase==="done")&&(<div style={{padding:"10px 14px",marginBottom:12,borderRadius:4,background:phase==="error"?T.red+"0d":phase==="done"?T.green+"0d":T.cyan+"0d",border:`1px solid ${phase==="error"?T.red:phase==="done"?T.green:T.cyan}22`,display:"flex",alignItems:"center",gap:10}}><span className={isRunning?"spin":""} style={{fontSize:14,color:phase==="error"?T.red:phase==="done"?T.green:T.cyan}}>{phase==="error"?"✕":phase==="done"?"✓":"◌"}</span><div><div style={{fontSize:11,color:phase==="error"?T.red:phase==="done"?T.green:T.cyan}}>{phase==="done"?`Done — ${results?.count||0} matches`:phase==="error"?"Failed":statusMsg}</div></div></div>)}{results&&!results.error&&(results.matches||[]).length>0&&(<><div style={{fontSize:10,color:T.textDim,marginBottom:10,display:"flex",gap:8,alignItems:"center",flexWrap:"wrap"}}><Label text={`${results.count} matches`} color={T.green}/><Btn small variant="ghost" onClick={()=>navigator.clipboard.writeText(results.matches.map(m=>m.text).join("\n")).catch(()=>{})}>Copy Text</Btn><button onClick={findCopy.go} style={{fontSize:9,padding:"2px 8px",borderRadius:2,border:`1px solid ${findCopy.color}55`,color:findCopy.color,background:findCopy.color+"0d",cursor:"pointer",fontFamily:T.font}}>{findCopy.label}</button></div>{(results.matches||[]).map((m,i)=>(<div key={i} className="fade-in" style={{background:T.bgCard,border:`1px solid ${T.border}`,borderRadius:4,marginBottom:4,overflow:"hidden"}}><div style={{padding:"6px 10px",display:"flex",gap:8,alignItems:"baseline"}}><Label text={`<${m.tag}>`} color={T.cyan}/><span style={{fontSize:10,color:T.text,flex:1}}>{(m.text||"").slice(0,120)}</span>{(m.attrs||[]).filter(([k])=>["href","src","class","id"].includes(k)).map(([k,v])=>(<span key={k} style={{fontSize:9,color:T.textDim}}>{k}=<span style={{color:T.textMid}}>{v.slice(0,40)}</span></span>))}</div><pre style={{background:T.bg,padding:"5px 10px",fontSize:9,color:T.textMid,overflowX:"auto",maxHeight:120,whiteSpace:"pre-wrap",wordBreak:"break-all",borderTop:`1px solid ${T.border}`}}>{(m.html||"").slice(0,500)}</pre></div>))}</>)}{results?.error&&(<div style={{color:T.red,padding:12,background:T.red+"0d",borderRadius:3,fontSize:11}}>✕ {results.error}</div>)}{phase==="idle"&&!results&&(<div style={{padding:"20px 10px"}}><div style={{fontSize:10,color:T.textDim,marginBottom:14}}>Quick examples:</div>{[["https://books.toscrape.com","p.price_color","Prices"],["https://news.ycombinator.com","span.titleline a","HN headlines"]].map(([u,sel,desc])=>(<div key={u} onClick={()=>{setUrl(u);setSelector(sel);}} style={{padding:"8px 12px",marginBottom:4,borderRadius:3,cursor:"pointer",background:T.bgCard,border:`1px solid ${T.border}`,display:"flex",gap:10,alignItems:"center"}} onMouseEnter={e=>e.currentTarget.style.borderColor=T.green+"44"} onMouseLeave={e=>e.currentTarget.style.borderColor=T.border}><span style={{fontSize:9,color:T.textDim,minWidth:60}}>{desc}</span><span style={{fontSize:10,color:T.textMid,flex:1}}>{u}</span><Label text={sel} color={T.green}/></div>))}</div>)}</div></div>);
};

const NavTab=()=>{
  const[url,setUrl]=useState("");const[msg,setMsg]=useState("");const[tracking,setTracking]=useState(false);
  const notify=(text,ms=2500)=>{setMsg(text);if(ms<9999)setTimeout(()=>setMsg(""),ms);};
  const nav=async()=>{if(!url.trim())return;notify(`Opening ${url}…`,9999);await apiFetch("/navigate",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({url})});setUrl("");notify("Tab opened ✓");};
  const cmd=async(command,label)=>{notify(`${label}…`,9999);await apiFetch("/cmd",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({command})});if(command==="track")setTracking(true);if(command==="untrack")setTracking(false);notify(`${label} ✓`);};
  return(<div style={{padding:16,overflowY:"auto",flex:1}}><SectionHead>Navigate + Auto-Track</SectionHead><div style={{display:"flex",gap:8,marginBottom:14}}><Input value={url} onChange={e=>setUrl(e.target.value)} onKeyDown={e=>e.key==="Enter"&&nav()} placeholder="https://…" style={{flex:1}}/><Btn onClick={nav}>Open + Track</Btn></div><div style={{display:"flex",gap:7,marginBottom:14}}><Btn onClick={()=>cmd("track","Track")} variant={tracking?"ghost":"green"}>● Track Tab</Btn><Btn onClick={()=>cmd("untrack","Untrack")} variant="red" disabled={!tracking}>○ Untrack</Btn></div><SectionHead>Page Commands</SectionHead><div style={{display:"flex",gap:7,flexWrap:"wrap",marginBottom:14}}>{[["cookies","Cookies"],["storage","Storage"],["html","HTML"],["screenshot","Screenshot"]].map(([c,lbl])=>(<Btn key={c} onClick={()=>cmd(c,lbl)} variant="ghost">{lbl}</Btn>))}</div>{msg&&<div style={{fontSize:11,padding:"7px 12px",borderRadius:3,color:T.green,background:T.green+"0d",border:`1px solid ${T.green}33`}}>{msg}</div>}</div>);
};

const QueueTab=()=>{
  const[urls,setUrls]=useState("");const[delay,setDelay]=useState(6);const[warmup,setWarmup]=useState(true);const[status,setStatus]=useState(null);
  const load=async()=>{const d=await apiFetch("/queue");setStatus(d);};
  useEffect(()=>{load();const t=setInterval(load,3000);return()=>clearInterval(t);},[]);
  const add=async()=>{const list=urls.split("\n").map(u=>u.trim()).filter(Boolean);if(!list.length)return;await apiFetch("/queue/add",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({urls:list,delay,warmup})});setUrls("");load();};
  const clear=async()=>{await apiFetch("/queue/clear",{method:"POST",headers:{"Content-Type":"application/json"},body:"{}"});load();};
  return(<div style={{padding:12,overflowY:"auto",flex:1}}><SectionHead>Batch URL Queue</SectionHead><textarea value={urls} onChange={e=>setUrls(e.target.value)} placeholder={"https://example.com/page1\nhttps://example.com/page2"} style={{width:"100%",height:90,background:T.bgCard,border:`1px solid ${T.border2}`,color:T.text,padding:8,fontFamily:T.font,fontSize:11,borderRadius:3,resize:"vertical",marginBottom:8,outline:"none"}}/><div style={{display:"flex",gap:10,alignItems:"center",marginBottom:14}}><label style={{fontSize:10,color:T.textDim}}>Delay (sec):</label><input type="number" value={delay} onChange={e=>setDelay(+e.target.value)} min={1} max={60} style={{width:55,background:T.bgCard,border:`1px solid ${T.border2}`,color:T.text,padding:"3px 8px",fontFamily:T.font,fontSize:11,borderRadius:3,outline:"none"}}/><label style={{fontSize:10,color:T.textDim,display:"flex",alignItems:"center",gap:5}}><input type="checkbox" checked={warmup} onChange={e=>setWarmup(e.target.checked)}/> Warmup</label><Btn onClick={add}>Add to Queue</Btn></div>{status&&(<div style={{background:T.bgCard,border:`1px solid ${T.border}`,borderRadius:4,padding:12}}><div style={{display:"flex",alignItems:"center",gap:10,marginBottom:8}}><div style={{width:7,height:7,borderRadius:"50%",background:status.running?T.green:T.textDim,animation:status.running?"pulse-dot 1.5s infinite":"none"}}/><span style={{fontSize:11,color:status.running?T.green:T.textDim}}>{status.running?"Running":"Idle"}</span><span style={{fontSize:10,color:T.textDim}}>{status.pending} pending</span>{status.pending>0&&<Btn onClick={clear} variant="red" small>Clear</Btn>}</div>{(status.items||[]).map((item,i)=>(<div key={i} style={{fontSize:10,padding:"4px 8px",borderBottom:`1px solid ${T.border}`,color:T.textMid,display:"flex",gap:8}}><span style={{color:T.textDim,minWidth:18}}>{i+1}.</span><span style={{flex:1,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{item.url}</span></div>))}</div>)}</div>);
};

// ── ROOT ──────────────────────────────────────────────────────────────────────
function App() {
  const[tab,setTab]           =useState("Live");
  const[domain,setDomain]     =useState(null);
  const[domains,setDomains]   =useState([]);
  const[events,setEvents]     =useState([]);
  const[connected,setConnected]=useState(false);
  const[selectorFromDom,setSelectorFromDom]=useState("");
  const[wsFrameCount,setWsFrameCount]=useState(0);

  const loadDomains=useCallback(async()=>{const d=await apiFetch("/domains");if(Array.isArray(d))setDomains(d);},[]);
  useEffect(()=>{loadDomains();const t=setInterval(loadDomains,8000);return()=>clearInterval(t);},[loadDomains]);

  useEffect(()=>{
    let src;
    const connect=()=>{
      src=new EventSource(API+"/live");
      src.onopen=()=>setConnected(true);
      src.onerror=()=>{setConnected(false);setTimeout(connect,3000);};
      src.onmessage=(e)=>{
        try{
          const item=JSON.parse(e.data);
          setEvents(prev=>[item,...prev].slice(0,500));
          // Count WS frames for badge
          if(["websocket","websocket_opened"].includes(item.type)) {
            setWsFrameCount(c=>c+1);
          }
          if(["dommap","debugger_status"].includes(item.type))loadDomains();
        }catch{}
      };
    };
    connect();
    return()=>src?.close();
  },[loadDomains]);

  // Clear WS badge when user opens the tab
  useEffect(()=>{
    if(tab==="WebSockets") setWsFrameCount(0);
  },[tab]);

  const handleUseSelector=(sel)=>{setSelectorFromDom(sel);setTab("Find");};
  const exportData=(d)=>{const a=document.createElement("a");a.href=d?`${API}/export?domain=${encodeURIComponent(d)}`:`${API}/export`;a.download=(d||"all_data")+".zip";document.body.appendChild(a);a.click();document.body.removeChild(a);};

  return(
    <div style={{fontFamily:T.font,background:T.bg,color:T.text,height:"100vh",display:"flex",flexDirection:"column",overflow:"hidden",backgroundImage:"repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,255,136,.008) 2px,rgba(0,255,136,.008) 4px)"}}>
      <header style={{background:T.bgCard,borderBottom:`1px solid ${T.border}`,padding:"8px 16px",display:"flex",alignItems:"center",gap:12,flexShrink:0}}>
        <span style={{fontSize:14,color:T.green,letterSpacing:3,fontWeight:700}}>◈ SCRAPY</span>
        <span style={{fontSize:8,color:T.textDim,letterSpacing:1}}>v3.3</span>
        <div style={{display:"flex",alignItems:"center",gap:5}}>
          <div style={{width:6,height:6,borderRadius:"50%",background:connected?T.green:T.red,animation:connected?"pulse-dot 2s infinite":"none"}}/>
          <span style={{fontSize:9,color:connected?T.green:T.red,letterSpacing:1}}>{connected?"LIVE":"OFFLINE"}</span>
        </div>
        <span style={{fontSize:9,color:T.textDim}}>{events.length} events</span>
        {domain&&(
          <div style={{padding:"3px 9px",borderRadius:3,border:`1px solid ${T.green}33`,background:T.green+"0a",fontSize:9,color:T.green,display:"flex",alignItems:"center",gap:5}}>
            <span style={{color:T.textDim}}>scope:</span>{domain}
            <span onClick={()=>setDomain(null)} style={{cursor:"pointer",color:T.textDim,marginLeft:2}}>×</span>
          </div>
        )}
        <div style={{marginLeft:"auto",display:"flex",gap:7}}>
          <Btn variant="yellow" small onClick={()=>exportData()}>⬇ Export All</Btn>
          {domain&&<Btn variant="yellow" small onClick={()=>exportData(domain)}>⬇ {domain}</Btn>}
        </div>
      </header>

      <TabBar active={tab} onChange={setTab} wsCount={wsFrameCount}/>

      <div style={{display:"flex",flex:1,overflow:"hidden"}}>
        <Sidebar domains={domains} active={domain} onSelect={setDomain}/>
        <div style={{flex:1,overflow:"hidden",display:"flex",flexDirection:"column"}}>
          {tab==="Live"        && <LiveTab events={events} onClear={()=>setEvents([])}/>}
          {tab==="WebSockets"  && <WSTab domain={domain} liveEvents={events}/>}
          {tab==="Bodies"      && <BodiesTab domain={domain}/>}
          {tab==="Responses"   && <ResponsesTab domain={domain}/>}
          {tab==="Intel"       && <IntelTab domain={domain}/>}
          {tab==="Tokens"      && <TokensTab domain={domain} events={events}/>}
          {tab==="Endpoints"   && <EndpointsTab domain={domain}/>}
          {tab==="DOM"         && <DomTab domain={domain} onUseSelector={handleUseSelector}/>}
          {tab==="Find"        && <FindTab domain={domain} selectorInit={selectorFromDom}/>}
          {tab==="Nav"         && <NavTab/>}
          {tab==="Queue"       && <QueueTab/>}
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));
</script>

<script>
(function() {
  var loader = document.getElementById('scrapy-loader');
  if (typeof React === 'undefined' || typeof Babel === 'undefined') {
    loader.innerHTML = '<div style="color:#ff4560;font-family:monospace;font-size:14px">Failed to load React/Babel from CDN</div>';
    return;
  }
  var tries = 0;
  var check = setInterval(function() {
    tries++;
    var root = document.getElementById('root');
    if ((root && root.children.length > 0) || tries > 60) {
      clearInterval(check);
      loader.classList.add('done');
      setTimeout(function() { loader.remove(); }, 400);
    }
  }, 100);
})();
</script>
</body>
</html>
